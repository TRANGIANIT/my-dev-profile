spring.application.name=ecommerce-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USER:ecommerce}
spring.datasource.password=${DB_PASSWORD:ecommerce}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET:change-this-development-secret}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
app.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:604800}
app.seed-demo-data=${SEED_DEMO_DATA:false}
app.upload-dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
