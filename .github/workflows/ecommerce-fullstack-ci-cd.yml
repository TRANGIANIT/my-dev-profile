name: Ecommerce Fullstack CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "PROJECTS/ecommerce-api/**"
      - "PROJECTS/ecommerce-web/**"
      - ".github/workflows/ecommerce-fullstack-ci-cd.yml"
  pull_request:
    paths:
      - "PROJECTS/ecommerce-api/**"
      - "PROJECTS/ecommerce-web/**"
      - ".github/workflows/ecommerce-fullstack-ci-cd.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test API
        working-directory: PROJECTS/ecommerce-api
        run: mvn test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: PROJECTS/ecommerce-web/package-lock.json

      - name: Build Web
        working-directory: PROJECTS/ecommerce-web
        run: |
          npm ci
          npm run build

      - name: Build Docker images
        run: |
          docker build -t ecommerce-api:ci PROJECTS/ecommerce-api
          docker build -t ecommerce-web:ci PROJECTS/ecommerce-web

  deploy:
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull
            cd PROJECTS/ecommerce-api
            docker compose up --build -d
